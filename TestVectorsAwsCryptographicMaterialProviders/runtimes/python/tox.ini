[tox]
isolated_build = True
# CI installs one Python per matrix job (see .github/workflows/library_python_tests.yml).
# Skip envlist interpreters that aren't present instead of failing the run.
skip_missing_interpreters = true
envlist =
  py{311,312,313}-{dafnytests,cli}

[testenv:dafnytests]
skip_install = true
allowlist_externals = poetry
passenv = AWS_*
setenv = VIRTUALENV_DOWNLOAD=0
         PIP_DISABLE_PIP_VERSION_CHECK=1
commands_pre =
    poetry lock
    poetry install --with test
commands =
    poetry run pytest -s -v test/

[testenv:cli]
skip_install = true
allowlist_externals = poetry
passenv = AWS_*
setenv = VIRTUALENV_DOWNLOAD=0
         PIP_DISABLE_PIP_VERSION_CHECK=1
commands_pre =
    poetry lock
    poetry install --with test
commands =
    poetry run python src/aws_cryptography_materialproviders_test_vectors/internaldafny/generated {posargs}