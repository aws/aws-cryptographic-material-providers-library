# This workflow performs MPL NET release
name: MPL-Release-Net-Lib

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      version:
          description: "The version being released"
          required: true
          type: string
      unique-id:
          description: "The unique signing id"
          required: true
          type: string
      project:
          description: "The project being released"
          required: true
          type: string
jobs:
  sign:
    strategy:
      matrix:
        dotnet-version: ["6.0.x"]
    runs-on: codebuild-AWS-MPL-Release-${{ github.run_id }}-${{ github.run_attempt }}-ubuntu-5.0-large
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true
      - name: Export signing ID
        shell: bash
        run: |
          export UNIQUE_ID=${{inputs.unique-id}}; 
  
  verify:
    needs: sign
    strategy:
      matrix:
        dotnet-version: ["6.0.x"]
    runs-on: codebuild-AWS-MPL-Release-${{ github.run_id }}-${{ github.run_attempt }}-ubuntu-5.0-large
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true
  
