# This workflow builds all Java libraries once per OS,
# publishing artifacts to Maven local for downstream test jobs.
name: Library Java Build

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean

jobs:
  buildJava:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: JavaBuild

      - uses: actions/checkout@v6
      - run: git submodule update --init libraries
      - run: git submodule update --init --recursive smithy-dafny

      - name: Setup Dafny
        uses: ./.github/actions/setup_dafny
        with:
          dafny-version: ${{ inputs.dafny }}

      - name: Install Smithy-Dafny codegen dependencies
        uses: ./.github/actions/install_smithy_dafny_codegen_dependencies

      - name: Regenerate code using smithy-dafny if necessary
        if: ${{ inputs.regenerate-code }}
        uses: ./.github/actions/polymorph_codegen
        with:
          dafny: ${{ env.DAFNY_VERSION }}
          library: TestVectorsAwsCryptographicMaterialProviders
          diff-generated-code: false

      - name: Setup Java 8
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 8

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 17

      - name: Build all libraries (recursive from TestVectors)
        working-directory: ./TestVectorsAwsCryptographicMaterialProviders
        run: |
          CORES=$(node -e 'console.log(os.cpus().length)')
          make build_java CORES=$CORES

      - name: Upload Maven local repository
        uses: actions/upload-artifact@v7
        with:
          name: java-maven-local-${{ matrix.os }}
          path: ~/.m2/repository/software/amazon/
          retention-days: 1

      - name: Upload transpiled source
        uses: actions/upload-artifact@v7
        with:
          name: java-transpiled-${{ matrix.os }}
          path: |
            **/runtimes/java/src/main/dafny-generated/
            **/runtimes/java/src/test/dafny-generated/
            !node_modules/**/
            !smithy-dafny/**/
          retention-days: 1
