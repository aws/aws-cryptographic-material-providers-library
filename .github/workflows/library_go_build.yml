# This workflow transpiles all Go libraries once per OS,
# uploading artifacts for downstream test jobs.
name: Library Go Build

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean

jobs:
  buildGo:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: GoBuild
          special-characters-workaround: "true" # Some environments (example: windowsOS) cannot tolerate special characters in a secret key.

      - uses: actions/checkout@v7
      - run: git submodule update --init libraries
      - run: git submodule update --init --recursive smithy-dafny

      - name: Setup Dafny
        uses: ./.github/actions/setup_dafny
        with:
          dafny-version: ${{ inputs.dafny }}

      - name: Install Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.24"

      - name: Install Smithy-Dafny codegen dependencies
        uses: ./.github/actions/install_smithy_dafny_codegen_dependencies

      - name: Regenerate code using smithy-dafny if necessary
        if: ${{ inputs.regenerate-code }}
        uses: ./.github/actions/polymorph_codegen
        with:
          dafny: ${{ env.DAFNY_VERSION }}
          library: TestVectorsAwsCryptographicMaterialProviders
          diff-generated-code: false

      - name: Transpile all libraries
        run: |
          CORES=$(node -e 'console.log(os.cpus().length)')
          for lib in StandardLibrary ComAmazonawsKms ComAmazonawsDynamodb AwsCryptographyPrimitives AwsCryptographicMaterialProviders TestVectorsAwsCryptographicMaterialProviders; do
            echo "=== Transpile $lib ==="
            make -C "$lib" transpile_go CORES=$CORES
          done

      # TODO: Remove this after Go polymorph does not generate unwanted duplicate code.
      - name: Purge polymorph code in Go
        working-directory: ./TestVectorsAwsCryptographicMaterialProviders
        run: |
          make purge_polymorph_code

      - run: echo "TIMESTAMP=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Upload generated Go source
        uses: actions/upload-artifact@v7
        with:
          name: go-generated-${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: |
            **/runtimes/go/ImplementationFromDafny-go/
            **/runtimes/go/TestsFromDafny-go/
            !node_modules/**/
            !smithy-dafny/**/
          retention-days: 1
