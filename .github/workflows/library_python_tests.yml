# This workflow performs tests in Python using pre-built artifacts.
name: Library Python tests

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean

jobs:
  buildPython:
    uses: ./.github/workflows/library_python_build.yml
    with:
      dafny: ${{ inputs.dafny }}
      regenerate-code: ${{ inputs.regenerate-code }}

  testPython:
    needs: buildPython
    strategy:
      fail-fast: false
      matrix:
        library:
          [
            StandardLibrary,
            AwsCryptographyPrimitives,
            ComAmazonawsKms,
            ComAmazonawsDynamodb,
            AwsCryptographicMaterialProviders,
            TestVectorsAwsCryptographicMaterialProviders,
          ]
        python-version: ["3.11", "3.13"]
        # TODO fix Dafny-generated tests on Windows;
        # the sys.path workaround for generated Dafny doesn't work on Windows.
        # Note: only tests use the sys.path workaround, not source code.
        # Windows source code is tested downstream (ex. ESDK-Python CI).
        # windows-latest,
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: PythonTests

      - uses: actions/checkout@v6
      - run: git submodule update --init libraries
      - run: git submodule update --init --recursive smithy-dafny

      - run: echo "TIMESTAMP=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Download transpiled Python source
        uses: actions/download-artifact@v8
        with:
          name: python-transpiled-${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: .

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - run: |
          python -m pip install --upgrade pip
          pip install --upgrade tox
          pip install poetry

      - name: Test ${{ matrix.library }}
        working-directory: ./${{ matrix.library }}
        run: |
          make test_python
