# This workflow builds TestVectors for all languages once per OS,
# uploading artifacts for downstream interop test jobs.
name: Library Interop Build

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean
      fuzz-testing:
        description: "Use fuzzed test vectors instead of regular test vectors"
        required: false
        default: false
        type: boolean

jobs:
  buildInterop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    env:
      RUST_MIN_STACK: 404857600
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: InteropBuild
          special-characters-workaround: "true" # Some environments (example: windowsOS) cannot tolerate special characters in a secret key.
          role-duration-seconds: 7200

      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Init Submodules
        shell: bash
        run: |
          git submodule update --init --recursive smithy-dafny

      # --- Language runtimes ---
      - name: Setup .NET Core SDK 6.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Setup .NET OpenSSL on Mac
        if: matrix.os == 'macos-14'
        run: |
          brew install openssl@3
          echo "DYLD_LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "DOTNET_CRYPTO_ENGINE_ADAPTER=System.Security.Cryptography.Algorithms.Managed" >> $GITHUB_ENV

      - name: Setup Java 8
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 8

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 17

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: x64
      - run: |
          python -m pip install --upgrade pip
          pip install --upgrade tox
          pip install poetry

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          cache: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install Go imports
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.36.0

      # --- Dafny + codegen ---
      - name: Setup Dafny
        uses: ./.github/actions/setup_dafny
        with:
          dafny-version: ${{ inputs.dafny }}

      - name: Install Smithy-Dafny codegen dependencies
        uses: ./.github/actions/install_smithy_dafny_codegen_dependencies

      - name: Regenerate code using smithy-dafny if necessary
        if: ${{ inputs.regenerate-code }}
        uses: ./.github/actions/polymorph_codegen
        with:
          dafny: ${{ env.DAFNY_VERSION }}
          library: TestVectorsAwsCryptographicMaterialProviders
          diff-generated-code: false

      # --- Build non-Rust languages (use standard Dafny) ---
      - name: Build Java
        shell: bash
        working-directory: ./TestVectorsAwsCryptographicMaterialProviders
        run: |
          CORES=$(node -e 'console.log(os.cpus().length)')
          make build_java CORES=$CORES

      - name: Build .NET
        shell: bash
        working-directory: ./TestVectorsAwsCryptographicMaterialProviders
        run: |
          CORES=$(node -e 'console.log(os.cpus().length)')
          make transpile_net CORES=$CORES

      - name: Build Python
        shell: bash
        working-directory: ./TestVectorsAwsCryptographicMaterialProviders
        run: |
          CORES=$(node -e 'console.log(os.cpus().length)')
          make transpile_python CORES=$CORES

      - name: Build Go
        shell: bash
        working-directory: ./TestVectorsAwsCryptographicMaterialProviders
        run: |
          CORES=$(node -e 'console.log(os.cpus().length)')
          make transpile_go CORES=$CORES

      - name: Purge polymorph code in Go
        shell: bash
        working-directory: ./TestVectorsAwsCryptographicMaterialProviders
        run: |
          make purge_polymorph_code

      # --- Build Rust (uses Dafny 4.10.0) ---
      - name: Setup Dafny for Rust
        uses: ./.github/actions/setup_dafny
        with:
          dafny-version: "4.10.0"

      - name: Build Rust (polymorph + transpile)
        shell: bash
        working-directory: ./TestVectorsAwsCryptographicMaterialProviders
        run: |
          CORES=$(node -e 'console.log(os.cpus().length)')
          make polymorph_rust
          make transpile_rust TRANSPILE_TESTS_IN_RUST=1 CORES=$CORES

      - run: echo "TIMESTAMP=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      # --- Upload artifacts per language ---
      - name: Upload Java transpiled source
        uses: actions/upload-artifact@v7
        with:
          name: interop-java-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: |
            **/runtimes/java/src/main/dafny-generated/
            **/runtimes/java/src/test/dafny-generated/
            !node_modules/**/
            !smithy-dafny/**/
          retention-days: 1

      - name: Upload Java Maven local
        uses: actions/upload-artifact@v7
        with:
          name: interop-java-maven-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: ~/.m2/repository/software/amazon/
          retention-days: 1

      - name: Upload .NET artifacts
        uses: actions/upload-artifact@v7
        with:
          name: interop-net-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: |
            **/runtimes/net/ImplementationFromDafny.cs
            **/runtimes/net/ImplementationFromDafny-cs.dtr
            **/runtimes/net/tests/TestsFromDafny.cs
            **/runtimes/net/tests/TestsFromDafny-cs.dtr
            !node_modules/**/
            !smithy-dafny/**/
          retention-days: 1

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v7
        with:
          name: interop-python-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: |
            **/runtimes/python/src/**/internaldafny/generated/
            **/runtimes/python/test/
            !node_modules/**/
            !smithy-dafny/**/
          retention-days: 1

      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v7
        with:
          name: interop-rust-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: |
            **/runtimes/rust/src/
            **/runtimes/rust/Cargo.lock
            !**/runtimes/rust/target/
            !node_modules/**/
            !smithy-dafny/**/
          retention-days: 1

      - name: Upload Go artifacts
        uses: actions/upload-artifact@v7
        with:
          name: interop-go-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: |
            **/runtimes/go/ImplementationFromDafny-go/
            **/runtimes/go/TestsFromDafny-go/
            !node_modules/**/
            !smithy-dafny/**/
          retention-days: 1
