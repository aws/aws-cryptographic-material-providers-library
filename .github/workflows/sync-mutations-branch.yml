# This workflow keeps mutations/mutations in sync with main.
# It creates a PR from main into mutations/mutations, which triggers
# the existing PR CI. A team member must approve and merge the PR.
name: Sync mutations/mutations with main

on:
  push:
    branches:
      - main
  # TODO: Remove pull_request trigger after testing
  pull_request:
    branches:
      - main
  schedule:
    # Weekdays at 15:00 UTC (8AM PDT), same cadence as daily CI
    - cron: "00 15 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # Don't run the cron builds on forks
    if: github.event_name != 'schedule' || github.repository_owner == 'aws'
    runs-on: ubuntu-latest
    outputs:
      pr_created: ${{ steps.create_pr.outputs.pr_created }}
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
    steps:
      - name: Checkout mutations/mutations
        uses: actions/checkout@v4
        with:
          ref: mutations/mutations
          fetch-depth: 0

      - name: Check if sync is needed
        id: check
        run: |
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "mutations/mutations already contains all commits from main"
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update sync PR
        id: create_pr
        if: steps.check.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a sync PR already exists
          EXISTING_PR=$(gh pr list --base mutations/mutations --head main --json number,url --jq '.[0]')
          if [ -n "$EXISTING_PR" ]; then
            echo "Sync PR already exists: $(echo "$EXISTING_PR" | jq -r '.url')"
            echo "pr_created=false" >> "$GITHUB_OUTPUT"
            echo "pr_url=$(echo "$EXISTING_PR" | jq -r '.url')" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --base mutations/mutations \
              --head main \
              --title "chore: sync mutations/mutations with main" \
              --body "Automated PR to keep \`mutations/mutations\` in sync with \`main\`.

          This PR was created automatically by the sync-mutations workflow.
          Please approve and merge once CI passes." \
              )
            echo "pr_created=true" >> "$GITHUB_OUTPUT"
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          fi

  notify-pr-created:
    needs: [sync]
    if: needs.sync.outputs.pr_created == 'true'
    uses: ./.github/workflows/slack-notification.yml
    with:
      message: "A PR has been created to sync `main` → `mutations/mutations` in `${{ github.repository }}`. Please review and merge: ${{ needs.sync.outputs.pr_url }}"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}

  notify-failure:
    needs: [sync]
    if: ${{ failure() }}
    uses: ./.github/workflows/slack-notification.yml
    with:
      message: "Failed to auto-sync `main` → `mutations/mutations` in `${{ github.repository }}`. View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
