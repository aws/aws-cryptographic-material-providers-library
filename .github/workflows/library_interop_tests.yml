# This workflow performs interoperability tests across the supported runtimes of the MPL
# using pre-built artifacts.
name: Library Interoperability Tests

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean
      fuzz-testing:
        description: "Use fuzzed test vectors instead of regular test vectors"
        required: false
        default: false
        type: boolean

jobs:
  buildInterop:
    uses: ./.github/workflows/library_interop_build.yml
    with:
      dafny: ${{ inputs.dafny }}
      regenerate-code: ${{ inputs.regenerate-code }}
      fuzz-testing: ${{inputs.fuzz-testing}}

  generateEncryptVectors:
    needs: buildInterop
    strategy:
      matrix:
        library: [TestVectorsAwsCryptographicMaterialProviders]
        os: [ubuntu-22.04, macos-14]
        language: [java, net, rust, python, go]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials for Tests
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: InterOpTests
          role-duration-seconds: 7200

      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Init Submodules
        shell: bash
        run: |
          git submodule update --init --recursive smithy-dafny

      # --- Runtime setup (only what's needed to RUN, not build) ---
      - name: Setup .NET Core SDK 6.0.x
        if: matrix.language == 'net'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Setup .NET OpenSSL on Mac
        if: matrix.os == 'macos-14' && matrix.language == 'net'
        run: |
          brew install openssl@3
          echo "DYLD_LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "DOTNET_CRYPTO_ENGINE_ADAPTER=System.Security.Cryptography.Algorithms.Managed" >> $GITHUB_ENV

      - name: Setup Java 8
        if: matrix.language == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 8

      - name: Setup Java 17
        if: matrix.language == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 17

      - name: Setup Python
        if: ${{ inputs.fuzz-testing || matrix.language == 'python' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: x64
      - name: Install Python deps
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade tox
          pip install poetry

      - name: Install hypothesis for fuzz testing
        if: ${{ inputs.fuzz-testing }}
        run: pip install hypothesis

      - name: Setup Rust Toolchain
        if: matrix.language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - run: echo "TIMESTAMP=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      # --- Download pre-built artifacts ---
      - name: Download pre-built artifacts
        uses: actions/download-artifact@v8
        with:
          name: interop-${{ matrix.language }}-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: .

      - name: Download Maven local (Java)
        if: matrix.language == 'java'
        uses: actions/download-artifact@v8
        with:
          name: interop-java-maven-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: ~/.m2/repository/software/amazon/

      # --- Generate and encrypt vectors ---
      - name: Create Manifests
        working-directory: ./${{ matrix.library }}
        run: |
          if [ "${{ inputs.fuzz-testing }}" = "true" ]; then
            echo "Generating fuzzed test vectors"
            make test_generate_fuzz_vectors_${{ matrix.language }} NUM_VECTORS=2000
          else
            make test_generate_vectors_${{ matrix.language }}
          fi

      - name: Create Encrypt Manifests
        working-directory: ./${{ matrix.library }}
        run: make test_encrypt_vectors_${{ matrix.language }}

      - name: Upload Encrypt Manifest and keys.json files
        uses: actions/upload-artifact@v7
        with:
          name: ${{matrix.os}}_vector_artifact_${{matrix.language}}${{ inputs.fuzz-testing && '_fuzz' || '' }}-${{ github.sha }}
          path: ./${{matrix.library}}/runtimes/${{matrix.language}}/*.json

  testInteroperablity:
    needs: [buildInterop, generateEncryptVectors]
    strategy:
      fail-fast: false
      matrix:
        library: [TestVectorsAwsCryptographicMaterialProviders]
        os: [ubuntu-22.04, macos-14]
        decrypting_language: [java, net, rust, python, go]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials for Tests
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: InterOpTests
          role-duration-seconds: 7200

      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Init Submodules
        shell: bash
        run: |
          git submodule update --init --recursive smithy-dafny

      # --- Runtime setup (only what's needed to RUN, not build) ---
      - name: Setup .NET Core SDK 6.0.x
        if: matrix.decrypting_language == 'net'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Setup .NET OpenSSL on Mac
        if: matrix.os == 'macos-14' && matrix.decrypting_language == 'net'
        run: |
          brew install openssl@3
          echo "DYLD_LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "DOTNET_CRYPTO_ENGINE_ADAPTER=System.Security.Cryptography.Algorithms.Managed" >> $GITHUB_ENV

      - name: Setup Java 8
        if: matrix.decrypting_language == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 8

      - name: Setup Java 17
        if: matrix.decrypting_language == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 17

      - name: Setup Python
        if: matrix.decrypting_language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: x64
      - name: Install Python deps
        if: matrix.decrypting_language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade tox
          pip install poetry

      - name: Setup Rust Toolchain
        if: matrix.decrypting_language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Setup Go
        if: matrix.decrypting_language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - run: echo "TIMESTAMP=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      # --- Download pre-built artifacts ---
      - name: Download pre-built artifacts
        uses: actions/download-artifact@v8
        with:
          name: interop-${{ matrix.decrypting_language }}-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: .

      - name: Download Maven local (Java)
        if: matrix.decrypting_language == 'java'
        uses: actions/download-artifact@v8
        with:
          name: interop-java-maven-${{ inputs.fuzz-testing && 'fuzz-' || '' }}${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: ~/.m2/repository/software/amazon/

      # --- Download and decrypt vectors from each encrypting language ---
      - name: Download Encrypt Manifest Artifact Java
        uses: actions/download-artifact@v8
        with:
          name: ${{matrix.os}}_vector_artifact_java${{ inputs.fuzz-testing && '_fuzz' || '' }}-${{ github.sha }}
          path: ./${{matrix.library}}/runtimes/${{matrix.decrypting_language}}

      - name: Decrypt Encrypt Manifest Java
        working-directory: ./${{ matrix.library }}
        run: make test_decrypt_encrypt_vectors_${{matrix.decrypting_language}}

      - name: Download Encrypt Manifest Artifact Net
        uses: actions/download-artifact@v8
        with:
          name: ${{matrix.os}}_vector_artifact_net${{ inputs.fuzz-testing && '_fuzz' || '' }}-${{ github.sha }}
          path: ./${{matrix.library}}/runtimes/${{matrix.decrypting_language}}

      - name: Decrypt Encrypt Manifest Net
        working-directory: ./${{ matrix.library }}
        run: make test_decrypt_encrypt_vectors_${{matrix.decrypting_language}}

      - name: Download Encrypt Manifest Artifact Rust
        uses: actions/download-artifact@v8
        with:
          name: ${{matrix.os}}_vector_artifact_rust${{ inputs.fuzz-testing && '_fuzz' || '' }}-${{ github.sha }}
          path: ./${{matrix.library}}/runtimes/${{matrix.decrypting_language}}

      - name: Decrypt Encrypt Manifest Rust
        working-directory: ./${{ matrix.library }}
        run: make test_decrypt_encrypt_vectors_${{matrix.decrypting_language}}

      - name: Download Encrypt Manifest Artifact Python
        uses: actions/download-artifact@v8
        with:
          name: ${{matrix.os}}_vector_artifact_python${{ inputs.fuzz-testing && '_fuzz' || '' }}-${{ github.sha }}
          path: ./${{matrix.library}}/runtimes/${{matrix.decrypting_language}}

      - name: Decrypt Encrypt Manifest Python
        working-directory: ./${{ matrix.library }}
        run: make test_decrypt_encrypt_vectors_${{matrix.decrypting_language}}

      - name: Download Encrypt Manifest Artifact Go
        uses: actions/download-artifact@v8
        with:
          name: ${{matrix.os}}_vector_artifact_go${{ inputs.fuzz-testing && '_fuzz' || '' }}-${{ github.sha }}
          path: ./${{matrix.library}}/runtimes/${{matrix.decrypting_language}}

      - name: Decrypt Encrypt Manifest Go
        working-directory: ./${{ matrix.library }}
        run: make test_decrypt_encrypt_vectors_${{matrix.decrypting_language}}
