# This workflow transpiles all .NET libraries once per OS,
# uploading artifacts for downstream test jobs.
name: Library .NET Build

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean

jobs:
  buildNet:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        shell: bash
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: NetBuild

      - uses: actions/checkout@v6
      - run: git submodule update --init libraries
      - run: git submodule update --init --recursive smithy-dafny

      - name: Setup .NET Core SDK 6.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Setup .NET OpenSSL on Mac
        if: matrix.os == 'macos-14'
        run: |
          brew install openssl@3
          echo "DYLD_LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "DOTNET_SYSTEM_SECURITY_CRYPTOGRAPHY_OPENSSL_OVERRIDE_VERSION_CHECK=1" >> $GITHUB_ENV
          echo "DOTNET_SYSTEM_NET_HTTP_USESOCKETSHTTPHANDLER=0" >> $GITHUB_ENV

      - name: Setup Dafny
        uses: ./.github/actions/setup_dafny
        with:
          dafny-version: ${{ inputs.dafny }}

      - name: Install Smithy-Dafny codegen dependencies
        uses: ./.github/actions/install_smithy_dafny_codegen_dependencies

      - name: Regenerate code using smithy-dafny if necessary
        if: ${{ inputs.regenerate-code }}
        uses: ./.github/actions/polymorph_codegen
        with:
          dafny: ${{ env.DAFNY_VERSION }}
          library: TestVectorsAwsCryptographicMaterialProviders
          diff-generated-code: false

      - name: Transpile all libraries (recursive from TestVectors)
        run: |
          CORES=$(node -e 'console.log(os.cpus().length)')
          # Transpile TestVectors which recursively transpiles all dependency implementations
          make -C TestVectorsAwsCryptographicMaterialProviders transpile_net CORES=$CORES
          # Transpile tests for each dependency library (transpile_dependencies only does implementation)
          for lib in StandardLibrary AwsCryptographyPrimitives ComAmazonawsKms ComAmazonawsDynamodb AwsCryptographicMaterialProviders; do
            make -C "$lib" transpile_test_net CORES=$CORES
          done

      - run: echo "TIMESTAMP=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV
      
      - name: Upload transpiled source
        uses: actions/upload-artifact@v7
        with:
          name: net-transpiled-${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: |
            **/runtimes/net/ImplementationFromDafny.cs
            **/runtimes/net/ImplementationFromDafny-cs.dtr
            **/runtimes/net/tests/TestsFromDafny.cs
            **/runtimes/net/tests/TestsFromDafny-cs.dtr
            !node_modules/**/
            !smithy-dafny/**/
          retention-days: 1
