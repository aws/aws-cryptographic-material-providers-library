# This workflow performs tests in .NET using pre-built artifacts.
name: Library net tests

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean

jobs:
  buildNet:
    uses: ./.github/workflows/library_net_build.yml
    with:
      dafny: ${{ inputs.dafny }}
      regenerate-code: ${{ inputs.regenerate-code }}

  testDotNet:
    needs: buildNet
    strategy:
      fail-fast: false
      matrix:
        library:
          [
            StandardLibrary,
            AwsCryptographyPrimitives,
            ComAmazonawsKms,
            ComAmazonawsDynamodb,
            AwsCryptographicMaterialProviders,
            TestVectorsAwsCryptographicMaterialProviders,
          ]
        dotnet-version: ["6.0.x"]
        os: [windows-latest, ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    permissions:
      id-token: write
      contents: read
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: NetTests

      - uses: actions/checkout@v6
      - run: git submodule update --init libraries
      - run: git submodule update --init --recursive smithy-dafny

      - name: Setup .NET Core SDK ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Setup .NET OpenSSL on Mac
        if: matrix.os == 'macos-14'
        run: |
          brew install openssl@3
          echo "DYLD_LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "DOTNET_SYSTEM_SECURITY_CRYPTOGRAPHY_OPENSSL_OVERRIDE_VERSION_CHECK=1" >> $GITHUB_ENV
          echo "DOTNET_SYSTEM_NET_HTTP_USESOCKETSHTTPHANDLER=0" >> $GITHUB_ENV

      - run: echo "TIMESTAMP=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Download transpiled source
        uses: actions/download-artifact@v8
        with:
          name: net-transpiled-${{ env.TIMESTAMP }}-${{ matrix.os }}-${{ github.sha }}
          path: .

      - name: Download Dependencies
        working-directory: ./${{ matrix.library }}
        run: make setup_net

      - name: Test ${{ matrix.library }} .NET net6.0
        working-directory: ./${{ matrix.library }}
        shell: bash
        run: |
          dotnet run --project runtimes/net/tests/ --framework net6.0

      - name: Test Cache Thread Safety net6.0
        if: matrix.library == 'AwsCryptographicMaterialProviders'
        working-directory: ./${{ matrix.library }}
        shell: bash
        run: |
          dotnet restore runtimes/net/tests/LocalCMC.Tests/
          dotnet build runtimes/net/tests/LocalCMC.Tests/
          dotnet test runtimes/net/tests/LocalCMC.Tests/ \
              --framework net6.0

      - name: Test Cache Thread Safety .NET Framework net48
        if: matrix.os == 'windows-latest' && matrix.library == 'AwsCryptographicMaterialProviders'
        working-directory: ./${{ matrix.library }}
        shell: bash
        run: |
          dotnet restore runtimes/net/tests/LocalCMC.Tests/
          dotnet build runtimes/net/tests/LocalCMC.Tests/
          dotnet test runtimes/net/tests/LocalCMC.Tests/ \
              --framework net48
