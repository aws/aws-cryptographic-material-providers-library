# This workflow transpiles all Python libraries once per OS,
# uploading artifacts for downstream test jobs.
name: Library Python Build

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean

jobs:
  buildPython:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: PythonBuild

      - uses: actions/checkout@v6
      - run: git submodule update --init libraries
      - run: git submodule update --init --recursive smithy-dafny

      - name: Setup Dafny
        uses: ./.github/actions/setup_dafny
        with:
          dafny-version: ${{ inputs.dafny }}

      - name: Setup Python for transpile
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: x64

      - name: Install Smithy-Dafny codegen dependencies
        uses: ./.github/actions/install_smithy_dafny_codegen_dependencies

      - name: Regenerate code using smithy-dafny if necessary
        if: ${{ inputs.regenerate-code }}
        uses: ./.github/actions/polymorph_codegen
        with:
          dafny: ${{ env.DAFNY_VERSION }}
          library: TestVectorsAwsCryptographicMaterialProviders
          diff-generated-code: false

      - name: Transpile all libraries
        run: |
          CORES=$(node -e 'console.log(os.cpus().length)')
          for lib in StandardLibrary AwsCryptographyPrimitives ComAmazonawsKms ComAmazonawsDynamodb AwsCryptographicMaterialProviders TestVectorsAwsCryptographicMaterialProviders; do
            echo "=== Transpile $lib ==="
            make -C "$lib" transpile_python CORES=$CORES
          done

      - name: Upload transpiled Python source
        uses: actions/upload-artifact@v7
        with:
          name: python-transpiled-${{ matrix.os }}
          path: |
            **/runtimes/python/src/**/internaldafny/generated/
            **/runtimes/python/test/
            !node_modules/**/
            !smithy-dafny/**/
          retention-days: 1
