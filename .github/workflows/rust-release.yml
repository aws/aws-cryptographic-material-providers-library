# This workflow publishes the aws-mpl-legacy crate to crates.io
# (`cargo publish`).
#
# Note: unlike DBESDK and ESDK, the MPL repo does not currently have a
# `test_published.sh` companion script, so this workflow stops after
# `cargo publish`. Add a post-publish smoke test step here if/when one
# is introduced.
#
# Regenerating `releases/rust/mpl/` and opening a release PR is automated
# by the `Rust Start Release` workflow (rust-start-release.yml) and MUST
# be run before this workflow. Dispatching this workflow without first
# running `Rust Start Release` (and reviewing/approving the resulting
# release PR) will publish whatever happens to be committed at
# `releases/rust/mpl/` and is unsupported.
#
# This workflow MUST be dispatched on the release PR's branch (head ref)
# BEFORE the PR is merged, so a failed publish leaves the unmerged PR
# for cleanup.
#
# Authenticates to crates.io via Trusted Publishing (OIDC): the
# `rust-lang/crates-io-auth-action` step exchanges the workflow's GitHub
# OIDC token for a short-lived crates.io token (automatically revoked
# when the job ends), gated by the `crates-io-publish` GitHub
# environment. No long-lived crates.io API token is stored in the repo.
# crates.io must be configured with a Trusted Publisher for this crate
# pointing at this repo, the `rust-release.yml` workflow, and the
# `crates-io-publish` environment.
name: Rust Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional. If provided, must match releases/rust/mpl/Cargo.toml version exactly (N.N.N format, e.g. '0.2.1'). Used as a typo safeguard; if omitted, the version in Cargo.toml is published as-is."
        required: false
        type: string

permissions: {}

jobs:
  publish:
    name: Publish aws-mpl-legacy to crates.io
    runs-on: ubuntu-22.04
    environment: crates-io-publish
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - uses: actions/checkout@v7

      - name: Setup Rust Toolchain for GitHub CI
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          cache: false

      - name: Read crate version from Cargo.toml
        id: cargo
        shell: bash
        working-directory: releases/rust/mpl
        run: |
          set -euo pipefail
          CRATE_VERSION="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          CRATE_NAME="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].name')"
          echo "version=${CRATE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${CRATE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Will publish ${CRATE_NAME} v${CRATE_VERSION}"

      - name: Verify input version matches Cargo.toml (if provided)
        if: ${{ github.event.inputs.version != '' }}
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          CARGO_VERSION: ${{ steps.cargo.outputs.version }}
        run: |
          set -euo pipefail
          if [ "${INPUT_VERSION}" != "${CARGO_VERSION}" ]; then
            echo "::error::Input version '${INPUT_VERSION}' does not match Cargo.toml version '${CARGO_VERSION}'."
            exit 1
          fi
          echo "Input version matches Cargo.toml: ${CARGO_VERSION}"

      - name: Cargo publish (dry run)
        shell: bash
        working-directory: releases/rust/mpl
        run: cargo publish --dry-run

      - name: Authenticate to crates.io (Trusted Publishing / OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Cargo publish
        shell: bash
        working-directory: releases/rust/mpl
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
