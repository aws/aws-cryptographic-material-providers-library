# This workflow performs tests in Java using pre-built artifacts.
name: Library Java tests

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean

jobs:
  buildJava:
    uses: ./.github/workflows/library_java_build.yml
    with:
      dafny: ${{ inputs.dafny }}
      regenerate-code: ${{ inputs.regenerate-code }}

  testJava:
    needs: buildJava
    strategy:
      fail-fast: false
      matrix:
        library:
          [
            AwsCryptographyPrimitives,
            ComAmazonawsKms,
            ComAmazonawsDynamodb,
            AwsCryptographicMaterialProviders,
            StandardLibrary,
          ]
        os: [ubuntu-22.04, macos-latest]
        java-versions: [8, 11, 17, 19, 21]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - name: Configure AWS Credentials for Tests
        uses: aws-actions/configure-aws-credentials@v6
        if: matrix.library == 'ComAmazonawsKms' || matrix.library == 'ComAmazonawsDynamodb' || matrix.library == 'AwsCryptographicMaterialProviders' || matrix.library == 'TestVectorsAwsCryptographicMaterialProviders'
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-MPL-Dafny-Role-us-west-2
          role-session-name: JavaTests
          special-characters-workaround: "true" # Some environments (example: windowsOS) cannot tolerate special characters in a secret key.

      - uses: actions/checkout@v6
      - run: git submodule update --init libraries
      - run: git submodule update --init --recursive smithy-dafny

      - name: Download Maven local repository
        uses: actions/download-artifact@v8
        with:
          name: java-maven-local-${{ matrix.os }}-${{ github.sha }}
          path: ~/.m2/repository/software/amazon/

      - name: Download transpiled source
        uses: actions/download-artifact@v8
        with:
          name: java-transpiled-${{ matrix.os }}-${{ github.sha }}
          path: .

      - name: Setup Java 8, for complex reasons
        if: ${{matrix.java-versions != 8 }}
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 8

      - name: Setup Java ${{ matrix.java-versions }}
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: ${{ matrix.java-versions }}

      - name: Test ${{ matrix.library }} on ${{ matrix.java-versions }}
        working-directory: ./${{ matrix.library }}/runtimes/java
        run: |
          ./gradlew runTests
          ./gradlew test --info
